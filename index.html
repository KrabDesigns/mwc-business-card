<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaWorld Business Card App</title>
<link rel="icon" type="image/x-icon" href="https://cdn.prod.website-files.com/688fa27c51e2912c29db08ce/68c11ec05df6364ebe67a4be_MW_Fevicon_32%20px.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Montserrat', sans-serif; background: #f0f0f0; color: #dde1ed; min-height: 100vh; padding: 36px 20px 60px; }
.header { text-align: center; margin-bottom: 44px; }
.header h1 { font-size: 20px; font-weight: 800; letter-spacing: 0.22em; color: #003366; text-transform: uppercase; }
.header p { font-size: 10px; font-weight: 600; letter-spacing: 0.18em; color: #00B68D; text-transform: uppercase; margin-top: 6px; }
.header-bar { width: 48px; height: 2px; background: linear-gradient(90deg,#00b68d,#2e5dab); border-radius: 2px; margin: 14px auto 0; }
.layout { display: flex; gap: 36px; max-width: 1100px; margin: 0 auto; align-items: flex-start; }
.form-panel { flex: 0 0 380px; background: #e7e7e7; border: 1px solid #1e2232; border-radius: 16px; padding: 28px 24px 24px; }
.form-panel h2 { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; color: #00b68d; text-transform: uppercase; margin-bottom: 22px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 9.5px; font-weight: 600; letter-spacing: 0.14em; color: #636882; text-transform: uppercase; margin-bottom: 7px; }
.field input, .field select { width: 100%; background: #f0f0f0; border: 1px solid #1e2232; border-radius: 7px; color: #1a1a1a; font-family: 'Montserrat', sans-serif; font-size: 12.5px; font-weight: 400; padding: 12px 25px 12px 12px; transition: border-color 0.18s; outline: none; resize: none; }
.field input:focus, .field textarea:focus { border-color: #00b68d; }
.field input::placeholder, .field textarea::placeholder { color: #6e7179; }
.field textarea { height: 76px; line-height: 1.55; }
.btn { width: 100%; margin-top: 6px; padding: 13px; background: linear-gradient(130deg,#00b68d,#1a5dab); border: none; border-radius: 8px; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; transition: opacity 0.18s, transform 0.1s; }
.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
.note { font-size: 9.5px; color: #373d56; text-align: center; margin-top: 12px; line-height: 1.7; }
#status { font-size: 10.5px; font-weight: 500; letter-spacing: 0.06em; padding: 9px 12px; border-radius: 6px; margin-top: 10px; display: none; }
#status.show { display: block; }
#status.ok   { background: #091e17; color: #00b68d; border: 1px solid #00b68d33; }
#status.err  { background: #1e0909; color: #e06060; border: 1px solid #e0606033; }
#status.busy { background: #0e1120; color: #7a9acc; border: 1px solid #2e5dab33; }
.preview-panel { flex: 1; min-width: 0; }
.preview-panel > h2 { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; color: #00b68d; text-transform: uppercase; margin-bottom: 18px; }
.card-label { font-size: 9.5px; font-weight: 600; letter-spacing: 0.14em; color: #373d56; text-transform: uppercase; margin-bottom: 8px; margin-top: 22px;}
.card-label + .card-label { margin-top: 22px; }
.card-wrap { border-radius: 10px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,51,102,.1); line-height: 0; max-width: 540px; }
.card-wrap svg { width: 100%; height: auto; display: block; }
@media (max-width: 760px) { .layout { flex-direction: column; } .form-panel { flex: 1 1 auto; width: 100%; } }
</style>
</head>
<body>
<div class="header">
  <h1>MWC Business Card App</h1>
  <p>MetaWorld Consultant &mdash; Print-Ready PDF</p>
  <div class="header-bar"></div>
</div>
<div class="layout">
  <div class="form-panel">
    <h2>Card Details</h2>
    <div class="field"><label>Full Name</label><input type="text" id="f-name" placeholder="e.g. Shahzaib Zahid" oninput="liveUpdate()"></div>
    <div class="field"><label>Designation</label><input type="text" id="f-desig" placeholder="e.g. Graphic Designer" oninput="liveUpdate()"></div>
    <div class="field"><label>Phone Number</label><input type="text" id="f-phone" placeholder="e.g. +92 316 1234567" oninput="liveUpdate()"></div>
    <div class="field"><label>Email Address</label><input type="text" id="f-email" placeholder="e.g. name@metaworldconsultant.com" oninput="liveUpdate()"></div>
    <div class="field"><label>Office Address</label><select id="f-addr" oninput="liveUpdate()">
      <option value="Office 101, SOL Bay, Al Khaleej Al Tejari 2 St Business Bay - Dubai">Dubai Office</option>
      <option value="Office No 8, Azam Line, Near Budni Bridge Charsadda Road, Peshawar KPK, Pakistan">Peshawar Office</option>
      <option value="M3, Mezzanine Floor, Dossal Arcade, Jinnah Avenue, Blue Area, Islamabad, Pakistan">Islamabad Office</option>
    </select>
    </div>
    <button class="btn" id="btnGen" onclick="generatePDF()">&#8595;&nbsp; Download PDF</button>
    <div id="status"></div>
    <p class="note">2-page PDF &bull; 88.9&times;50.8 mm &bull; 300 DPI &bull; Montserrat</p>
  </div>
  <div class="preview-panel">
    <h2>Live Preview</h2>
    <div class="card-label">Front &mdash; Page 1</div>
    <div class="card-wrap" id="prevFront"></div>
    <div class="card-label">Back &mdash; Page 2</div>
    <div class="card-wrap" id="prevBack"></div>
  </div>
</div>

// ---- XML escaping ----
function escXml(s) {
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&apos;");
}

// ---- Text measurement ----
// Measure at 500px for high precision (avoids sub-pixel rounding at tiny sizes),
// then scale back to SVG user units (font-size 6.29px in SVG = 6.29 user units).
// We call this ONLY after document.fonts.ready so Montserrat is guaranteed loaded.
var _mc = document.createElement("canvas").getContext("2d");
var MEASURE_SCALE = 500;   // measure at 500px, scale down to 6.29

function measureSVGUnits(text) {
  _mc.font = "300 " + MEASURE_SCALE + "px Montserrat, sans-serif";
  var pxAt500 = _mc.measureText(text).width;
  // width in SVG user units = pxAt500 * (6.29 / MEASURE_SCALE)
  return pxAt500 * (6.29 / MEASURE_SCALE);
}

// ---- Address word-wrap ----
// Card safe zone analysis (SVG viewBox 270x162):
//   Gradient image inner clip rect starts at x = 184.31
//   Outer curve clip-path left edge at address y (~134-150) ≈ x = 240
//   Blue solid shape left edge at address y ≈ x = 254
//   Text starts at x = 41.85
//   Conservative safe right edge: x = 190  →  maxWidth = 190 - 41.85 = 148 SVG units
var ADDR_MAX_WIDTH = 154;

// Generic wrapper: breaks on whitespace first; any "word" (e.g. a long
// email address with no spaces) that is still wider than maxWidth on its
// own gets hard-broken character by character so it can never overflow.
function wrapToWidth(text, maxWidth, maxLines) {
  var words = (text || "").trim().split(/\s+/);
  var lines = [];
  var line  = "";

  function pushLine(l) {
    if (l) lines.push(l);
  }

  function breakLongToken(token) {
    // Splits a single overlong token into width-constrained chunks.
    var chunk = "";
    for (var c = 0; c < token.length; c++) {
      var test = chunk + token[c];
      if (measureSVGUnits(test) <= maxWidth || chunk === "") {
        chunk = test;
      } else {
        pushLine(chunk);
        chunk = token[c];
      }
    }
    return chunk;
  }

  for (var i = 0; i < words.length; i++) {
    var word = words[i];

    if (measureSVGUnits(word) > maxWidth) {
      // The word itself is too wide (e.g. a long unbroken email/URL) —
      // flush the current line, then hard-break the word by character.
      pushLine(line);
      line = breakLongToken(word);
      continue;
    }

    var test = line ? line + " " + word : word;
    if (measureSVGUnits(test) <= maxWidth) {
      line = test;
    } else {
      pushLine(line);
      line = word;
    }
  }
  pushLine(line);
  return lines.slice(0, maxLines);
}

function wrapAddress(text) {
  return wrapToWidth(text, ADDR_MAX_WIDTH, 4);  // max 4 lines before running off card bottom
}

// Email uses the same safe-zone width as the address, but only has room
// for 2 lines before it would collide with the address line below it.
function wrapEmail(text) {
  return wrapToWidth(text, 141, 2);
}

// ---- Build back SVG from user data ----
function buildBack(d) {
  var lines  = wrapAddress(d.address);
  var tspans = "";
  if (lines.length > 0) {
    for (var i = 0; i < lines.length; i++) {
      tspans += '<tspan x="0" y="' + (i * 6.29).toFixed(2) + '">' + escXml(lines[i]) + "</tspan>";
    }
  } else {
    tspans = '<tspan x="0" y="0">' + escXml(d.address || "") + "</tspan>";
  }

  var emailLines  = wrapEmail(d.email);
  var emailTspans = "";
  if (emailLines.length > 1) {
    // Wrapped to 2 lines: shift the block up so it centers on the
    // envelope icon instead of just stacking downward from the baseline.
    var EMAIL_LH     = 6.29; // line height between wrapped email lines
    var ICON_SHIFT   = -1.36; // moves the 2-line block's center to align with the icon
    var startY = ICON_SHIFT - EMAIL_LH / 2;
    for (var j = 0; j < emailLines.length; j++) {
      emailTspans += '<tspan x="0" y="' + (startY + j * EMAIL_LH).toFixed(2) + '">' + escXml(emailLines[j]) + "</tspan>";
    }
  } else if (emailLines.length === 1) {
    // Single line: keep the original baseline untouched.
    emailTspans = '<tspan x="0" y="0">' + escXml(emailLines[0]) + "</tspan>";
  } else {
    emailTspans = '<tspan x="0" y="0">' + escXml(d.email || "") + "</tspan>";
  }

  return BACK_TMPL
    .replace("{{NAME}}",        escXml(d.name        || "Full Name"))
    .replace("{{DESIGNATION}}", escXml(d.designation || "Designation"))
    .replace("{{PHONE}}",       escXml(d.phone       || "+00 000 0000000"))
    .replace("{{EMAIL}}",       emailTspans)
    .replace("{{ADDRESS}}",     tspans);
}

function getData() {
  return {
    name:        document.getElementById("f-name").value.trim(),
    designation: document.getElementById("f-desig").value.trim(),
    phone:       document.getElementById("f-phone").value.trim(),
    email:       document.getElementById("f-email").value.trim(),
    address:     document.getElementById("f-addr").value.trim()
  };
}

// ---- Live Preview ----
// Wait for fonts before every update so measurement uses real Montserrat widths
function liveUpdate() {
  document.fonts.ready.then(function() {
    var d = getData();
    document.getElementById("prevFront").innerHTML = FRONT_SVG;
    document.getElementById("prevBack").innerHTML  = buildBack(d);
  });
}

// ---- PDF Generation ----
function svgToCanvas(svgStr, w, h, scale) {
  return new Promise(function(resolve, reject) {
    var blob = new Blob([svgStr], { type: "image/svg+xml;charset=utf-8" });
    var url  = URL.createObjectURL(blob);
    var img  = new Image();
    img.onload = function() {
      var c    = document.createElement("canvas");
      c.width  = Math.round(w * scale);
      c.height = Math.round(h * scale);
      var ctx  = c.getContext("2d");
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(img, 0, 0, c.width, c.height);
      URL.revokeObjectURL(url);
      resolve(c);
    };
    img.onerror = function(e) { URL.revokeObjectURL(url); reject(e); };
    img.src = url;
  });
}

async function generatePDF() {
  var btn = document.getElementById("btnGen");
  var st  = document.getElementById("status");
  function setS(msg, cls) { st.textContent = msg; st.className = "show " + cls; }

  var d = getData();
  if (!d.name) { setS("Please enter at least a name.", "err"); return; }

  btn.disabled = true;
  setS("Rendering at 300 DPI…", "busy");

  try {
    // Guarantee Montserrat is loaded (same promise liveUpdate uses)
    await document.fonts.ready;

    // 3.5" x 2" card; SVG viewBox 270x162; 300 DPI -> scale = 1050/270
    var SCALE = (3.5 * 300) / 270;
    var W_MM = 88.9, H_MM = 50.8, SVG_W = 270, SVG_H = 162;

    setS("Rendering front…", "busy");
    var cFront = await svgToCanvas(FRONT_SVG, SVG_W, SVG_H, SCALE);

    setS("Rendering back…", "busy");
    var cBack  = await svgToCanvas(buildBack(d), SVG_W, SVG_H, SCALE);

    setS("Building PDF…", "busy");
    var jsPDF = window.jspdf.jsPDF;
    var pdf   = new jsPDF({ orientation: "landscape", unit: "mm", format: [H_MM, W_MM] });
    pdf.addImage(cFront.toDataURL("image/jpeg", 1.0), "JPEG", 0, 0, W_MM, H_MM);
    pdf.addPage([H_MM, W_MM], "landscape");
    pdf.addImage(cBack.toDataURL("image/jpeg", 1.0),  "JPEG", 0, 0, W_MM, H_MM);

    var fname = (d.name || "card").replace(/\s+/g, "-").toLowerCase() + "-business-card.pdf";
    pdf.save(fname);
    setS("\u2713 PDF downloaded!", "ok");
  } catch(e) {
    console.error(e);
    setS("Error generating PDF. Please try again.", "err");
  }
  btn.disabled = false;
}

// ---- Init ----
window.addEventListener("DOMContentLoaded", function() {
  // Pre-warm font loading so first liveUpdate has accurate measurements
  document.fonts.load("300 500px Montserrat").then(liveUpdate);
});
</script>
