<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaWorld Email Signature App</title>
<link rel="icon" type="image/x-icon" href="https://cdn.prod.website-files.com/688fa27c51e2912c29db08ce/68c11ec05df6364ebe67a4be_MW_Fevicon_32%20px.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Montserrat', sans-serif; background: #f0f0f0; color: #dde1ed; min-height: 100vh; padding: 36px 20px 60px; }
.header { text-align: center; margin-bottom: 44px; }
.header h1 { font-size: 20px; font-weight: 800; letter-spacing: 0.22em; color: #003366; text-transform: uppercase; }
.header p { font-size: 10px; font-weight: 600; letter-spacing: 0.18em; color: #00B68D; text-transform: uppercase; margin-top: 6px; }
.header-bar { width: 48px; height: 2px; background: linear-gradient(90deg,#00b68d,#2e5dab); border-radius: 2px; margin: 14px auto 0; }
.layout { display: flex; gap: 36px; max-width: 1200px; margin: 0 auto; align-items: flex-start; }
.form-panel { flex: 0 0 380px; background: #e7e7e7; border: 1px solid #1e2232; border-radius: 16px; padding: 28px 24px 24px; }
.form-panel h2 { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; color: #00b68d; text-transform: uppercase; margin-bottom: 22px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 9.5px; font-weight: 600; letter-spacing: 0.14em; color: #636882; text-transform: uppercase; margin-bottom: 7px; }
.field input, .field select { width: 100%; background: #f0f0f0; border: 1px solid #1e2232; border-radius: 7px; color: #1a1a1a; font-family: 'Montserrat', sans-serif; font-size: 12.5px; font-weight: 400; padding: 12px 25px 12px 12px; transition: border-color 0.18s; outline: none; resize: none; }
.field input:focus, .field select:focus { border-color: #00b68d; }
.field input::placeholder { color: #6e7179; }
.field-row { display: flex; gap: 12px; margin-bottom: 16px; }
.field-row .field { flex: 1; margin-bottom: 0; }
.btn { width: 100%; margin-top: 6px; padding: 13px; background: linear-gradient(130deg,#00b68d,#1a5dab); border: none; border-radius: 8px; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; transition: opacity 0.18s, transform 0.1s; }
.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.98); }
.btn-outline { background: #f0f0f0; color: #003366; border: 1px solid #1e2232; background: none; }
.btn-outline:hover { background: #e7e7e7; opacity: 1; }
.btn-link { width: 100%; margin-top: 10px; padding: 13px; background: #003366; border: none; border-radius: 8px; text-align: center; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; transition: opacity 0.18s, transform 0.1s; }
.btn-link:hover { opacity: 0.88; }
.btn-link:active { transform: scale(0.98); }
.btn-link:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
 a:link { color: #fff; text-decoration: none; }
 a:visited { color: #fff; }
.note { font-size: 9.5px; color: #373d56; text-align: center; margin-top: 12px; line-height: 1.7; }
#status { font-size: 10.5px; font-weight: 500; letter-spacing: 0.06em; padding: 9px 12px; border-radius: 6px; margin-top: 10px; display: none; }
#status.show { display: block; }
#status.ok   { background: #091e17; color: #00b68d; border: 1px solid #00b68d33; }
#status.err  { background: #1e0909; color: #e06060; border: 1px solid #e0606033; }
.preview-panel { flex: 1; min-width: 0; }
.preview-panel > h2 { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; color: #00b68d; text-transform: uppercase; margin-bottom: 18px; }
.card-label { font-size: 9.5px; font-weight: 600; letter-spacing: 0.14em; color: #373d56; text-transform: uppercase; margin-bottom: 8px; }
.card-wrap { border-radius: 10px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,51,102,.1); line-height: 0; }
.card-wrap svg { width: 100%; height: auto; display: block; }
@media (max-width: 820px) { .layout { flex-direction: column; } .form-panel { flex: 1 1 auto; width: 100%; } }
</style>
</head>
<body>
<div class="header">
  <h1>MWC Email Signature App</h1>
  <p>MetaWorld Consultant &mdash; Signature Generator</p>
  <div class="header-bar"></div>
</div>
<div class="layout">
  <div class="form-panel">
    <h2>Signature Details</h2>
    <div class="field-row">
      <div class="field"><label>First Name</label><input type="text" id="f-first" placeholder="e.g. Shahzaib" oninput="liveUpdate()"></div>
      <div class="field"><label>Last Name</label><input type="text" id="f-last" placeholder="e.g. Zahid" oninput="liveUpdate()"></div>
    </div>
    <div class="field"><label>Designation</label><input type="text" id="f-desig" placeholder="e.g. Graphic Designer" oninput="liveUpdate()"></div>
    <div class="field"><label>Phone Number</label><input type="text" id="f-phone" placeholder="e.g. +92 316 1234567" oninput="liveUpdate()"></div>
    <div class="field"><label>Email Address</label><input type="text" id="f-email" placeholder="e.g. name@metaworldconsultant.com" oninput="liveUpdate()"></div>
    <div class="field"><label>Office Address</label><select id="f-addr" oninput="liveUpdate()">
      <option value="dubai">Dubai Office</option>
      <option value="islamabad">Islamabad Office</option>
      <option value="peshawar">Peshawar Office</option>
    </select></div>
    <button class="btn" onclick="downloadPNG()"><svg width="14" height="14" viewBox="0 -6 18 18" fill="none">
        <path d="M7 1v8M4 6l3 3 3-3M1 12h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg> Download PNG</button>
    <button class="btn btn-outline" style="margin-top:8px;" onclick="downloadSVG()"><svg width="14" height="14" viewBox="0 -6 18 18" fill="none">
        <path d="M7 1v8M4 6l3 3 3-3M1 12h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg> Download SVG</button>
    <a href="/mwc-bc-es">
      <div class="btn-link">
        &#8592;&nbsp; Go Back
      </div>
    </a>
    <div id="status"></div>
    <p class="note">Names auto-uppercased</p>
  </div>
  <div class="preview-panel">
    <h2>Live Preview</h2>
    <div class="card-label">Email Signature</div>
    <div class="card-wrap" id="prevSig"></div>
  </div>
</div>

  islamabad: { addr1: "M3, Mezzanine Floor, Dossal Arcade, Jinnah Avenue,", addr2: "Blue Area, Islamabad, Pakistan" },
  peshawar:  { addr1: "Office No 8, Azam Line, Near Budni Bridge,",          addr2: "Charsadda Road, Peshawar, Khyber Pakhtunkhwa" },
  dubai:     { addr1: "Office 101, SOL Bay, Al Khaleej Al Tejari 2 St,",     addr2: "Business Bay, Dubai, UAE" }
};

function escXml(s) {
  return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&apos;");
}

function buildSVG() {
  const firstName   = (document.getElementById("f-first").value || "SHAHZAIB").toUpperCase().trim();
  const lastName    = (document.getElementById("f-last").value  || "ZAHID").toUpperCase().trim();
  const designation = (document.getElementById("f-desig").value || "GRAPHIC DESIGNER").toUpperCase().trim();
  const phone       = document.getElementById("f-phone").value.trim() || "+92 316 5154414";
  const email       = document.getElementById("f-email").value.trim() || "shahzaib.zahid@metaworldconsultant.com";
  const office      = OFFICES[document.getElementById("f-addr").value];
  return SVG_TEMPLATE
    .replace("{{FIRSTNAME}}",   escXml(firstName))
    .replace("{{LASTNAME}}",    escXml(lastName))
    .replace("{{DESIGNATION}}", escXml(designation))
    .replace("{{PHONE}}",       escXml(phone))
    .replace("{{EMAIL}}",       escXml(email))
    .replace("{{ADDR1}}",       escXml(office.addr1))
    .replace("{{ADDR2}}",       escXml(office.addr2));
}

function liveUpdate() {
  document.getElementById("prevSig").innerHTML = buildSVG();
}

function downloadSVG() {
  const blob = new Blob([buildSVG()], { type: "image/svg+xml;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "metaworld-signature.svg";
  a.click();
}

function downloadPNG() {
  const W = 1615.56, H = 423.72, scale = 2;
  setStatus("busy", "Generating PNG…");
  let svg = buildSVG();
  svg = svg.replace(/(<svg\b[^>]*?)>/, '$1 width="' + W + '" height="' + H + '">');
  const blob = new Blob([svg], { type: "image/svg+xml;charset=utf-8" });
  const url  = URL.createObjectURL(blob);
  const img  = new Image();
  img.onload = function() {
    const canvas  = document.createElement("canvas");
    canvas.width  = W * scale;
    canvas.height = H * scale;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, W * scale, H * scale);
    URL.revokeObjectURL(url);
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = "metaworld-signature.png";
    a.click();
    setStatus("ok", "PNG downloaded ✓");
    setTimeout(() => document.getElementById("status").classList.remove("show"), 3000);
  };
  img.onerror = function() {
    URL.revokeObjectURL(url);
    setStatus("err", "PNG export failed — try Download SVG instead.");
  };
  img.src = url;
}

function setStatus(type, msg) {
  const el = document.getElementById("status");
  el.className = "show " + type;
  el.textContent = msg;
}

liveUpdate();
